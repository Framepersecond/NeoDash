services:
  neodash:
    build: .
    container_name: neodash-panel
    restart: always
    network_mode: "host" 
    pid: "host"
    privileged: true
    environment:
      # PANEL_PORT wird vom ENTRYPOINT als -Dneodash.port JVM-Property genutzt
      - PANEL_PORT=${PANEL_PORT}
      - NEODASH_DATA_PATH=/app/data
      - NEODASH_SERVER_PATH=/app/servers
    volumes:
      - ${DATA_PATH}:/app/data
      - ${SERVER_PATH}:/app/servers
