# Dash Admin Dashboard Configuration

# Web server port for the admin dashboard
port: 8080

# Database settings for player data tracking
database:
  type: sqlite
  file: dash.db

# Backup settings
backups:
  directory: backups
  max-backups: 10

# Optional public base URL for clickable setup links (e.g. https://panel.example.com)
panel-url: ""

# Optional Discord webhook for setup-required notifications
setup-discord-webhook-url: ""

# Discord webhooks for event notifications
# Each entry has a URL and a list of subscribed events: audit, chat, server_start_stop, console_warnings
discord-webhooks: []

# GitHub updater (public repo by default; token optional)
updater:
  enabled: true
  github-repo: "Framepersecond/NeoDash"
  dash-token: ""
  github-token: ""

# Installer Dash plugin source (GitHub releases/latest)
dash:
  github-repo: "Framepersecond/Dash"
  github-token: ""
# Example:
# discord-webhooks:
#   - url: "https://discord.com/api/webhooks/..."
#     events:
#       - audit
#       - server_start_stop

