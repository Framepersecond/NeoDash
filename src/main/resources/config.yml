# Dash Admin Dashboard Configuration

# Web server port for the admin dashboard
port: 8080

# Database settings for player data tracking
database:
  type: sqlite
  file: dash.db

# Backup settings
backups:
  directory: backups
  max-backups: 10

# Optional public base URL for clickable setup links (e.g. https://panel.example.com)
panel-url: ""

# Optional Discord webhook for setup-required notifications
setup-discord-webhook-url: ""

# Discord webhooks for event notifications
# Each entry has a URL and a list of subscribed events: audit, chat, server_start_stop, console_warnings
discord-webhooks: []

# GitHub updater (private repository support via PAT)
updater:
  enabled: true
  github-repo: "Framepersecond/NeoDash-Updates"
  dash-token: "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"
  github-token: "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"

# Installer Dash plugin source (GitHub releases/latest)
dash:
  github-repo: "Framepersecond/Dash"
  github-token: "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"
